<script type="text/html" id="goalTrackerObjectiveTemplate">
    <div class="progress" style="height: 1.25rem;">
        <div class="progress-bar text-left" role="progressbar"
            data-bind="attr: { style: 'width:' + (Math.min(progressPercent(), 1) * 100) + '%'},
                css: { 'bg-primary': progressPercent() < 1, 'bg-success': progressPercent() >= 1 }"
            aria-valuemin="0" aria-valuemax="100">
        </div>
        <div class="position-absolute w-100 h-100 px-1">
            <div class="d-flex h-100 w-100 align-items-center">
                <div class="flex-grow-1" data-bind="text: progressText()"></div>
                <div data-bind="text: progressPercent().toLocaleString('en-US', { style: 'percent' })"></div>
            </div>
        </div>
    </div>
</script>
